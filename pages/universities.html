<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universities Accepting PTE | PTE HUB</title>

    <!-- Global Styles -->
    <link rel="stylesheet" href="../styles/css/style.css">
    <link rel="stylesheet" href="../styles/css/navbar.css">
    <link rel="stylesheet" href="../styles/css/footer.css">
    <link rel="stylesheet" href="../styles/css/auth-popup.css">
    <link rel="stylesheet" href="../styles/css/theme.css">

    <!-- Font Awesome & Google Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <script src="../scripts/js/theme.js"></script>

    <style>
        /* ===== HERO SECTION ===== */
        .universities-hero {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            position: relative;
            padding: 100px 20px 80px;
            text-align: center;
            color: white;
            overflow: hidden;
        }

        .universities-hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://img.magnific.com/free-photo/focused-students-using-tablet-discussing-information_1262-14929.jpg');
            background-size: cover;
            background-position: center 30%;
            opacity: 0.5;
            z-index: 0;
        }

        .universities-hero .hero-inner {
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
        }

        .universities-hero h1 {
            font-size: 3.2rem;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        .universities-hero p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* ===== FILTER & SEARCH SECTION ===== */
        .filter-section {
            padding: 40px 20px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .search-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 35px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border-radius: 60px;
            padding: 5px 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 20px var(--shadow-card);
            border: 1px solid var(--border-card);
            transition: 0.3s;
        }

        .search-box i {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .search-box input {
            flex: 1;
            padding: 14px 12px;
            border: none;
            background: transparent;
            font-size: 1rem;
            outline: none;
            color: var(--text-primary);
        }

        .search-box input::placeholder {
            color: var(--text-light);
        }

        .search-box:focus-within {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px var(--shadow-card-hover);
        }

        /* TABS */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 45px;
        }

        .tab-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s;
            color: var(--text-secondary);
            box-shadow: 0 2px 6px var(--shadow-card);
        }

        .tab-btn i {
            margin-right: 6px;
        }

        .tab-btn.active {
            background: #8d2123;
            border-color: #8d2123;
            color: white;
            box-shadow: 0 6px 14px rgba(141, 33, 35, 0.35);
        }

        .tab-btn:hover:not(.active) {
            background: var(--bg-secondary);
            transform: translateY(-2px);
        }

        /* UNIVERSITIES GRID */
        .universities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 28px;
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px 20px 60px;
        }

        .uni-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--shadow-card);
            border: 1px solid var(--border-card);
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .uni-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px var(--shadow-card-hover);
        }

        .card-header {
            margin-bottom: 16px;
        }

        .country-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(26, 75, 140, 0.1);
            color: #1a4b8c;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .country-badge i {
            font-size: 0.8rem;
        }

        .card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-body h3 {
            font-size: 1.3rem;
            margin-bottom: 12px;
            color: var(--text-primary);
            font-weight: 700;
        }

        .card-body p {
            color: var(--text-secondary);
            line-height: 1.5;
            font-size: 0.9rem;
            margin-bottom: 24px;
            flex: 1;
        }

        .requirements-box {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .req-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .req-row:last-child {
            margin-bottom: 0;
        }

        .req-label {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .req-value {
            font-size: 0.85rem;
            font-weight: 700;
        }

        .req-value.pte-score {
            color: #9b2226;
        }

        .req-value.intakes {
            color: var(--text-primary);
        }

        .card-footer {
            margin-top: auto;
        }

        .uni-link {
            display: block;
            text-align: center;
            background: transparent;
            border: 1px solid #9b2226;
            padding: 12px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #9b2226;
            text-decoration: none;
            transition: 0.25s;
        }

        .uni-link:hover {
            background: rgba(155, 34, 38, 0.05);
        }

        /* NO RESULTS */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .universities-hero h1 {
                font-size: 2.2rem;
            }

            .tab-btn {
                padding: 6px 18px;
                font-size: 0.8rem;
            }

            .universities-grid {
                grid-template-columns: 1fr;
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <header id="header">
        <div id="navbar-placeholder"></div>
    </header>

    <main>
        <!-- Hero -->
        <section class="universities-hero">
            <div class="hero-inner">
                <div class="hero-badge">
                    <i class="fas fa-graduation-cap"></i> 3500+ institutions worldwide
                </div>
                <h1>Top Universities Accepting PTE</h1>
                <p>Find your dream university - PTE Academic is accepted by thousands of leading institutions across the
                    globe.</p>
            </div>
        </section>

        <!-- Filter & Search -->
        <div class="filter-section">
            <div class="search-wrapper">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search by university name...">
                </div>
            </div>
            <div class="tabs" id="filterTabs">
                <button class="tab-btn active" data-country="all"><i class="fas fa-globe"></i> All</button>
                <button class="tab-btn" data-country="australia"><i class="fas fa-map-pin"></i> Australia</button>
                <button class="tab-btn" data-country="canada"><i class="fas fa-map-pin"></i> Canada</button>
                <button class="tab-btn" data-country="uk"><i class="fas fa-map-pin"></i> United Kingdom</button>
                <button class="tab-btn" data-country="newzealand"><i class="fas fa-map-pin"></i> New Zealand</button>
            </div>
        </div>

        <!-- Universities Grid -->
        <div id="universitiesGrid" class="universities-grid">
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <div id="auth-popup-placeholder"></div>

    <script src="../scripts/js/navbar.js"></script>
    <script src="../scripts/js/footer.js"></script>
    <script src="../scripts/js/script.js"></script>
    <script src="../scripts/js/auth-popup.js"></script>

    <script>
        // --------------------------------
        // UNIVERSITY DATA
        // --------------------------------
        const universitiesData = [
            // AUSTRALIA
            { name: "University of Melbourne", country: "australia", location: "Melbourne, Australia", description: "A public research university in Melbourne, consistently ranked as one of the top academic institutions in the Southern Hemisphere.", score: "65+ (No band less than 58)", intakes: "Feb, July", link: "#" },
            { name: "University of Sydney", country: "australia", location: "Sydney, Australia", description: "Australia's first university, offering a broad range of programs and a vibrant campus life in the heart of Sydney.", score: "68+ (No band less than 61)", intakes: "Feb, Aug", link: "#" },
            { name: "Australian National University", country: "australia", location: "Canberra, Australia", description: "Located in Canberra, ANU is celebrated for its research-intensive focus and excellent student-to-staff ratios.", score: "64+ (No band less than 55)", intakes: "Feb, July", link: "#" },
            { name: "University of Queensland", country: "australia", location: "Brisbane, Australia", description: "Member of Group of Eight. Accepts PTE Academic for all courses.", score: "64+", intakes: "Feb, July", link: "#" },
            { name: "Monash University", country: "australia", location: "Melbourne, Australia", description: "Innovative university with strong industry links. PTE Academic accepted.", score: "58-65", intakes: "Feb, July", link: "#" },

            // CANADA
            { name: "University of Toronto", country: "canada", location: "Toronto, Canada", description: "Canada's top university. PTE Academic accepted for undergraduate and graduate admissions.", score: "60-76", intakes: "Sep, Jan", link: "#" },
            { name: "University of British Columbia", country: "canada", location: "Vancouver, Canada", description: "World-class research university. Accepts PTE scores for all programs.", score: "65+", intakes: "Sep, Jan", link: "#" },
            { name: "McGill University", country: "canada", location: "Montreal, Canada", description: "Highly selective, PTE Academic recognised for English proficiency.", score: "65+", intakes: "Sep, Jan", link: "#" },
            { name: "University of Alberta", country: "canada", location: "Edmonton, Canada", description: "Leading public university. PTE accepted across faculties.", score: "59-68", intakes: "Sep, Jan", link: "#" },
            { name: "University of Waterloo", country: "canada", location: "Waterloo, Canada", description: "Known for engineering & co-op. PTE Academic accepted.", score: "63+", intakes: "Sep, Jan", link: "#" },

            // UNITED KINGDOM
            { name: "University of Oxford", country: "uk", location: "Oxford, UK", description: "Global elite university. PTE Academic accepted for most postgraduate programs.", score: "66-76", intakes: "Sep, Oct", link: "#" },
            { name: "University of Cambridge", country: "uk", location: "Cambridge, UK", description: "Accepts PTE Academic for undergraduate and graduate admissions.", score: "76+", intakes: "Sep, Oct", link: "#" },
            { name: "Imperial College London", country: "uk", location: "London, UK", description: "STEM specialist. PTE scores widely accepted.", score: "62-69", intakes: "Sep, Oct", link: "#" },
            { name: "University College London", country: "uk", location: "London, UK", description: "Multidisciplinary university. PTE Academic accepted for all levels.", score: "62-75", intakes: "Sep, Jan", link: "#" },
            { name: "University of Edinburgh", country: "uk", location: "Edinburgh, UK", description: "Prestigious Scottish university. Recognises PTE Academic.", score: "65+", intakes: "Sep", link: "#" },

            // NEW ZEALAND
            { name: "University of Auckland", country: "newzealand", location: "Auckland, New Zealand", description: "New Zealand's highest-ranked university. PTE Academic accepted.", score: "58-65", intakes: "Feb, July", link: "#" },
            { name: "University of Otago", country: "newzealand", location: "Dunedin, New Zealand", description: "Renowned for health sciences. Accepts PTE scores.", score: "58-64", intakes: "Feb, July", link: "#" },
            { name: "Victoria University of Wellington", country: "newzealand", location: "Wellington, New Zealand", description: "Accepts PTE Academic for admission and visa purposes.", score: "58+", intakes: "Feb, July", link: "#" },
            { name: "University of Canterbury", country: "newzealand", location: "Christchurch, New Zealand", description: "Leading research university. PTE accepted.", score: "50-64", intakes: "Feb, July", link: "#" },
            { name: "Massey University", country: "newzealand", location: "Palmerston North, New Zealand", description: "Accepts PTE Academic for all programs.", score: "50-65", intakes: "Feb, July", link: "#" },
        ];

        let currentCountry = "all";
        let currentSearch = "";

        // DOM elements
        const gridContainer = document.getElementById("universitiesGrid");
        const searchInput = document.getElementById("searchInput");
        const tabButtons = document.querySelectorAll(".tab-btn");

        // Filter function
        function filterUniversities() {
            let filtered = universitiesData.filter(uni => {
                // country filter
                if (currentCountry !== "all" && uni.country !== currentCountry) return false;
                // search filter (by name or location)
                if (currentSearch.trim() !== "") {
                    const query = currentSearch.toLowerCase();
                    return uni.name.toLowerCase().includes(query) || uni.location.toLowerCase().includes(query);
                }
                return true;
            });
            renderUniversities(filtered);
        }

        // Render cards
        function renderUniversities(universities) {
            if (!gridContainer) return;
            if (universities.length === 0) {
                gridContainer.innerHTML = `<div class="no-results"><i class="fas fa-school-circle-exclamation"></i> <br>No universities match your criteria. Try another filter!</div>`;
                return;
            }

            const cardsHTML = universities.map(uni => {
                let countryName = "";
                if (uni.country === "australia") countryName = "AUSTRALIA";
                else if (uni.country === "canada") countryName = "CANADA";
                else if (uni.country === "uk") countryName = "UNITED KINGDOM";
                else if (uni.country === "newzealand") countryName = "NEW ZEALAND";
                else countryName = "GLOBAL";

                // Generate unique ID slug from university name
                const uniSlug = uni.name.toLowerCase().replace(/ /g, '-').replace(/[^\w-]/g, '');

                return `
                <div class="uni-card">
                    <div class="card-header">
                        <div class="country-badge">
                            <i class="fas fa-globe-asia"></i> ${countryName}
                        </div>
                    </div>
                    <div class="card-body">
                        <h3>${uni.name}</h3>
                        <p>${uni.description}</p>
                        
                        <div class="requirements-box">
                            <div class="req-row">
                                <span class="req-label">PTE Requirement:</span>
                                <span class="req-value pte-score">${uni.score}</span>
                            </div>
                            <div class="req-row">
                                <span class="req-label">Intakes:</span>
                                <span class="req-value intakes">${uni.intakes || 'Feb, July'}</span>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <a href="university-detail.html?id=${uniSlug}" class="uni-link">View Course Guide &rarr;</a>
                    </div>
                </div>
            `;
            }).join("");
            gridContainer.innerHTML = cardsHTML;
        }

        // Event Listeners
        tabButtons.forEach(btn => {
            btn.addEventListener("click", () => {
                // update active class
                tabButtons.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentCountry = btn.getAttribute("data-country");
                filterUniversities();
            });
        });

        searchInput.addEventListener("input", (e) => {
            currentSearch = e.target.value;
            filterUniversities();
        });

        // initial render
        filterUniversities();
    </script>

</body>

</html>
