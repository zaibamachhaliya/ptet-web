<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Profile | PTE HUB</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../styles/css/style.css">
    <link rel="stylesheet" href="../styles/css/navbar.css">
    <link rel="stylesheet" href="../styles/css/footer.css">
    <link rel="stylesheet" href="../styles/css/theme.css">
    <link rel="stylesheet" href="/styles/css/profile.css">
    
    <link rel="preload" href="../components/navbar.html" as="fetch" crossorigin="anonymous">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <script src="../scripts/js/theme.js"></script>
</head>

<body>

    <!-- Navbar -->
    <header id="header">
        <div id="navbar-placeholder"></div>
    </header>

    <!-- PROFILE PART -->
    <section class="profile-page">

        <div class="profile-container">

            <div class="profile-banner">
                <img src="/assets/images/profile.png" alt="Profile photo" class="profile-avatar">
            </div>

            <h2 class="profile-heading">Your Profile</h2>
            <p class="profile-subtitle">Track Your Profile</p>

            <div class="profile-details">

                <div class="profile-row">
                    <span class="profile-icon"><i class="fas fa-user"></i></span>
                    <div class="profile-field">
                        <label>Name</label>
                        <span id="profileName"></span>
                    </div>
                </div>

                <div class="profile-row">
                    <span class="profile-icon"><i class="fas fa-envelope"></i></span>
                    <div class="profile-field">
                        <label>Email</label>
                        <span id="profileEmail"></span>
                    </div>
                </div>

                <div class="profile-row">
                    <span class="profile-icon"><i class="fas fa-lock"></i></span>
                    <div class="profile-field">
                        <label>Password</label>
                        <span id="profilePassword"></span>
                    </div>
                    <button type="button" id="togglePassword" class="toggle-password" aria-label="Show password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <div class="profile-row">
                    <span class="profile-icon"><i class="fas fa-chart-line"></i></span>
                    <div class="profile-field">
                        <label>Your Score</label>
                        <span id="profileScore">Not available yet</span>
                    </div>
                </div>

            </div>

            <button class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </section>



    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <script src="../scripts/js/auth.js"></script>
    <script src="../scripts/js/navbar.js"></script>
    <script src="../scripts/js/footer.js"></script>
    

</body>
</html>
