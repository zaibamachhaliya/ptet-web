<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Details | PTE HUB</title>

    <!-- Global Styles -->
    <link rel="stylesheet" href="../styles/css/style.css">
    <link rel="stylesheet" href="../styles/css/navbar.css">
    <link rel="stylesheet" href="../styles/css/footer.css">
    <link rel="stylesheet" href="../styles/css/auth-popup.css">
    <link rel="stylesheet" href="../styles/css/theme.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="../scripts/js/theme.js"></script>

    <style>
        .detail-hero {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            padding: 100px 20px 60px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .detail-hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://img.magnific.com/free-photo/focused-students-using-tablet-discussing-information_1262-14929.jpg');
            background-size: cover;
            background-position: center 30%;
            opacity: 0.5;
            z-index: 0;
        }
        .detail-hero::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #8d2123, #c0392b, #8d2123);
            z-index: 2;
        }
        .hero-inner {
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
        }
        .hero-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .detail-hero h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .detail-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            padding: 8px 20px;
            border-radius: 40px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 30px;
            border: 1px solid var(--border-card);
            transition: 0.25s;
            font-size: 0.9rem;
        }
        .back-link:hover {
            transform: translateX(-5px);
            background: var(--bg-secondary);
            box-shadow: 0 4px 10px var(--shadow-card);
        }
        .uni-detail-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px var(--shadow-card);
            border: 1px solid var(--border-card);
        }
        .detail-header {
            padding: 35px 40px 20px;
            border-bottom: 1px solid var(--border-card);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 15px;
            background: rgba(26, 75, 140, 0.015);
        }
        .country-badge-large {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(26, 75, 140, 0.1);
            color: #1a4b8c;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .detail-title-group h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-weight: 800;
        }
        .detail-location {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .detail-body {
            padding: 35px 40px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 35px;
        }
        .info-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-card);
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: all 0.3s;
        }
        .info-card:hover {
            box-shadow: 0 5px 15px var(--shadow-card-hover);
            transform: translateY(-3px);
        }
        .info-card-icon {
            font-size: 1.4rem;
            color: #1a4b8c;
            margin-bottom: 4px;
        }
        .info-card h4 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin: 0;
            font-weight: 600;
        }
        .info-card .value {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .info-card.highlight {
            border-color: rgba(155, 34, 38, 0.2);
            background: rgba(155, 34, 38, 0.02);
        }
        .info-card.highlight .info-card-icon {
            color: #9b2226;
        }
        .info-card.highlight .value {
            color: #9b2226;
        }
        
        .description {
            margin: 30px 0;
            line-height: 1.7;
            font-size: 1.05rem;
            color: var(--text-secondary);
        }
        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 40px 0 20px;
            color: var(--text-primary);
            border-left: 4px solid #1a4b8c;
            padding-left: 15px;
        }
        .program-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0 35px;
        }
        .program-tag {
            background: var(--bg-secondary);
            border: 1px solid var(--border-card);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            color: var(--text-primary);
            font-weight: 600;
            transition: 0.2s;
        }
        .program-tag:hover {
            background: rgba(26, 75, 140, 0.1);
            color: #1a4b8c;
            border-color: rgba(26, 75, 140, 0.2);
        }
        .external-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: transparent;
            color: #9b2226;
            border: 1.5px solid #9b2226;
            padding: 14px 32px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            transition: 0.3s;
            width: fit-content;
        }
        .external-link:hover {
            background: rgba(155, 34, 38, 0.05);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(155, 34, 38, 0.15);
        }
        .not-found {
            text-align: center;
            padding: 80px 20px;
        }
        @media (max-width: 768px) {
            .detail-header { padding: 25px; }
            .detail-title-group h1 { font-size: 1.8rem; }
            .detail-body { padding: 25px; }
            .external-link { width: 100%; }
        }
    </style>
</head>
<body>

<header id="header">
    <div id="navbar-placeholder"></div>
</header>

<main>
    <div class="detail-hero">
        <div class="hero-inner">
            <div class="hero-badge">
                <i class="fas fa-graduation-cap"></i> 3500+ institutions worldwide
            </div>
            <h1 id="heroTitle">University Information</h1>
            <p>Overview of PTE requirements, intakes, and admission insights</p>
        </div>
    </div>

    <div class="detail-container">
        <a href="universities.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Universities</a>

        <div id="universityDetailContent">
            <div style="text-align: center; padding: 60px;">
                <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: #1a4b8c;"></i>
                <p style="margin-top: 15px; color: var(--text-muted);">Loading details...</p>
            </div>
        </div>
    </div>
</main>

<div id="footer-placeholder"></div>
<div id="auth-popup-placeholder"></div>

<script src="../scripts/js/navbar.js"></script>
<script src="../scripts/js/footer.js"></script>
<script src="../scripts/js/script.js"></script>
<script src="../scripts/js/auth-popup.js"></script>

<script>
    // Complete university dataset with extended details matching the main page
    const universitiesFull = [
        // Australia
        { id: "university-of-melbourne", name: "University of Melbourne", country: "australia", location: "Melbourne, Australia", description: "Australia's second oldest university, consistently ranked among the world's top 30. Offers over 400 courses. Known for rigorous academic standards and a rich campus experience.", score: "65+ (No band less than 58)", intakes: "Feb, July", website: "#", acceptance: "~70%", programs: ["Engineering", "Medicine", "Law", "Business", "Arts"] },
        { id: "australian-national-university", name: "Australian National University", country: "australia", location: "Canberra, Australia", description: "World-leading research university, ranked #1 in Australia. Known for political science, international relations, and strong focus on post-graduate research.", score: "64+ (No band less than 55)", intakes: "Feb, July", website: "#", acceptance: "~35%", programs: ["Politics", "Economics", "Sciences", "Law", "Philosophy"] },
        { id: "university-of-sydney", name: "University of Sydney", country: "australia", location: "Sydney, Australia", description: "One of Australia's prestigious Group of Eight universities. Boasts a historic campus, strong alumni network, and excellent global employability rankings.", score: "68+ (No band less than 61)", intakes: "Feb, Aug", website: "#", acceptance: "~30%", programs: ["Health Sciences", "Engineering", "Business", "Arts", "Architecture"] },
        { id: "university-of-queensland", name: "University of Queensland", country: "australia", location: "Brisbane, Australia", description: "Member of the Group of Eight, known for life sciences, engineering excellence, and a beautiful riverside campus.", score: "64+", intakes: "Feb, July", website: "#", acceptance: "~40%", programs: ["Biotechnology", "Engineering", "Business", "Education"] },
        { id: "monash-university", name: "Monash University", country: "australia", location: "Melbourne, Australia", description: "Largest university in Australia, with strong industry connections, innovative teaching, and global campuses in Malaysia and elsewhere.", score: "58-65", intakes: "Feb, July", website: "#", acceptance: "~50%", programs: ["Pharmacy", "Engineering", "IT", "Business", "Law"] },
        
        // Canada
        { id: "university-of-toronto", name: "University of Toronto", country: "canada", location: "Toronto, Canada", description: "Canada's top-ranked university, heavily research-intensive with three vibrant campuses across the Greater Toronto Area.", score: "60-76", intakes: "Sep, Jan", website: "#", acceptance: "~43%", programs: ["Computer Science", "Medicine", "Business", "Engineering", "Law"] },
        { id: "university-of-british-columbia", name: "University of British Columbia", country: "canada", location: "Vancouver, Canada", description: "Renowned for sustainability and research, offering a beautiful coastal campus and excellent programs across numerous disciplines.", score: "65+", intakes: "Sep, Jan", website: "#", acceptance: "~52%", programs: ["Forestry", "Environmental Science", "Commerce", "Engineering"] },
        { id: "mcgill-university", name: "McGill University", country: "canada", location: "Montreal, Canada", description: "One of Canada's most internationally diverse universities, strong in medicine, law, and arts, set in a dynamic bilingual city.", score: "65+", intakes: "Sep, Jan", website: "#", acceptance: "~46%", programs: ["Medicine", "Law", "Music", "Engineering", "Arts"] },
        { id: "university-of-alberta", name: "University of Alberta", country: "canada", location: "Edmonton, Canada", description: "Top 5 Canadian university, known for pioneering energy research, artificial intelligence, and strong engineering faculties.", score: "59-68", intakes: "Sep, Jan", website: "#", acceptance: "~58%", programs: ["Petroleum Engineering", "AI", "Business", "Nursing"] },
        { id: "university-of-waterloo", name: "University of Waterloo", country: "canada", location: "Waterloo, Canada", description: "Famous for its extensive co-op programs and world-class computer science and engineering excellence.", score: "63+", intakes: "Sep, Jan", website: "#", acceptance: "~53%", programs: ["Computer Science", "Engineering", "Mathematics", "Accounting"] },
        
        // UK
        { id: "university-of-oxford", name: "University of Oxford", country: "uk", location: "Oxford, UK", description: "Oldest university in the English-speaking world, with an unmatched global reputation, collegiate structure, and rigorous tutorials.", score: "66-76", intakes: "Sep, Oct", website: "#", acceptance: "~17%", programs: ["Humanities", "Sciences", "Medicine", "Law", "Business"] },
        { id: "university-of-cambridge", name: "University of Cambridge", country: "uk", location: "Cambridge, UK", description: "Global leader in research, collegiate system, historic rivalry with Oxford, and a profound track record of scientific discovery.", score: "76+", intakes: "Sep, Oct", website: "#", acceptance: "~21%", programs: ["STEM", "Arts", "Social Sciences", "Medicine"] },
        { id: "imperial-college-london", name: "Imperial College London", country: "uk", location: "London, UK", description: "Highly selective institution focused purely on science, engineering, medicine, and business, located in central London.", score: "62-69", intakes: "Sep, Oct", website: "#", acceptance: "~28%", programs: ["Engineering", "Medicine", "Data Science", "Physics"] },
        { id: "university-college-london", name: "University College London", country: "uk", location: "London, UK", description: "A highly multidisciplinary university, ranked among the world's top 10, known for strong research output and global outlook.", score: "62-75", intakes: "Sep, Jan", website: "#", acceptance: "~30%", programs: ["Architecture", "Law", "Psychology", "Education"] },
        { id: "university-of-edinburgh", name: "University of Edinburgh", country: "uk", location: "Edinburgh, UK", description: "Prestigious historic Scottish university, particularly strong in artificial intelligence, humanities, and medicine.", score: "65+", intakes: "Sep", website: "#", acceptance: "~40%", programs: ["Informatics", "Veterinary Medicine", "History", "Economics"] },
        
        // New Zealand
        { id: "university-of-auckland", name: "University of Auckland", country: "newzealand", location: "Auckland, New Zealand", description: "New Zealand's largest and highest-ranked university, offering a comprehensive range of academic programs and strong research.", score: "58-65", intakes: "Feb, July", website: "#", acceptance: "~60%", programs: ["Engineering", "Commerce", "Medical Sciences", "Law"] },
        { id: "university-of-otago", name: "University of Otago", country: "newzealand", location: "Dunedin, New Zealand", description: "Known for world-class health sciences, a picturesque campus, and a very vibrant, close-knit student life.", score: "58-64", intakes: "Feb, July", website: "#", acceptance: "~65%", programs: ["Dentistry", "Physiotherapy", "Humanities", "Sciences"] },
        { id: "victoria-university-of-wellington", name: "Victoria University of Wellington", country: "newzealand", location: "Wellington, New Zealand", description: "Located in the capital, it has exceptional strengths in law, public policy, humanities, and creative arts.", score: "58+", intakes: "Feb, July", website: "#", acceptance: "~70%", programs: ["Law", "Film", "Public Administration", "Design"] },
        { id: "university-of-canterbury", name: "University of Canterbury", country: "newzealand", location: "Christchurch, New Zealand", description: "Pioneering engineering and natural sciences research, with modern facilities and strong industry ties.", score: "50-64", intakes: "Feb, July", website: "#", acceptance: "~75%", programs: ["Civil Engineering", "Astronomy", "Forestry", "Education"] },
        { id: "massey-university", name: "Massey University", country: "newzealand", location: "Palmerston North, New Zealand", description: "Well-known for its excellent distance learning capabilities, alongside leading agriculture and veterinary science programs.", score: "50-65", intakes: "Feb, July", website: "#", acceptance: "~80%", programs: ["Veterinary Medicine", "Agriculture", "Aviation", "Design"] },
    ];

    // Helper to get university by ID
    function getUniversityById(id) {
        return universitiesFull.find(uni => uni.id === id);
    }

    // Render detail page
    function renderUniversityDetail() {
        const urlParams = new URLSearchParams(window.location.search);
        const uniId = urlParams.get('id');
        const container = document.getElementById('universityDetailContent');
        
        if (!uniId) {
            container.innerHTML = `
                <div class="not-found">
                    <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #8d2123;"></i>
                    <h2>No university selected</h2>
                    <p style="color: var(--text-muted); margin-top: 10px;">Please go back and choose a university to view its details.</p>
                    <a href="universities.html" class="external-link" style="margin-top: 25px;">Browse Universities</a>
                </div>
            `;
            return;
        }
        
        const uni = getUniversityById(uniId);
        if (!uni) {
            container.innerHTML = `
                <div class="not-found">
                    <i class="fas fa-university" style="font-size: 3rem; opacity: 0.3;"></i>
                    <h2>University not found</h2>
                    <p style="color: var(--text-muted); margin-top: 10px;">The university you're looking for doesn't exist in our database.</p>
                    <a href="universities.html" class="external-link" style="margin-top: 25px;">View All Universities</a>
                </div>
            `;
            return;
        }

        // Update hero title
        const heroTitle = document.getElementById("heroTitle");
        if (heroTitle) {
            heroTitle.innerText = `${uni.name} Information`;
        }
        
        // Country Name & Flag
        let countryName = "GLOBAL";
        if (uni.country === "australia") countryName = "AUSTRALIA";
        else if (uni.country === "canada") countryName = "CANADA";
        else if (uni.country === "uk") countryName = "UNITED KINGDOM";
        else if (uni.country === "newzealand") countryName = "NEW ZEALAND";
        
        const programsHTML = uni.programs.map(prog => `<span class="program-tag">${prog}</span>`).join('');
        
        const html = `
            <div class="uni-detail-card">
                <div class="detail-header">
                    <div class="country-badge-large">
                        <i class="fas fa-globe-asia"></i> ${countryName}
                    </div>
                    <div class="detail-title-group">
                        <h1>${uni.name}</h1>
                        <div class="detail-location">
                            <i class="fas fa-map-marker-alt" style="color: #9b2226;"></i> ${uni.location}
                        </div>
                    </div>
                </div>
                
                <div class="detail-body">
                    <div class="info-grid">
                        <div class="info-card highlight">
                            <div class="info-card-icon"><i class="fas fa-chart-line"></i></div>
                            <h4>PTE Requirement</h4>
                            <div class="value">${uni.score}</div>
                        </div>
                        <div class="info-card">
                            <div class="info-card-icon"><i class="fas fa-calendar-alt"></i></div>
                            <h4>Major Intakes</h4>
                            <div class="value">${uni.intakes || 'Feb, July'}</div>
                        </div>
                        <div class="info-card">
                            <div class="info-card-icon"><i class="fas fa-percent"></i></div>
                            <h4>Acceptance Rate</h4>
                            <div class="value">${uni.acceptance}</div>
                        </div>
                    </div>
                    
                    <h3 class="section-title">About the University</h3>
                    <div class="description">
                        ${uni.description}
                    </div>
                    
                    <h3 class="section-title">Popular Programs</h3>
                    <div class="program-list">
                        ${programsHTML}
                    </div>
                    
                    <div style="margin-top: 40px;">
                        <a href="${uni.website}" target="_blank" rel="noopener noreferrer" class="external-link">
                            Visit Official Website <i class="fas fa-arrow-right" style="margin-left: 5px;"></i>
                        </a>
                    </div>
                </div>
            </div>
        `;
        
        container.innerHTML = html;
        // Update page title
        document.title = `${uni.name} - PTE Requirements | PTE HUB`;
    }
    
    // Execute when DOM ready
    document.addEventListener("DOMContentLoaded", renderUniversityDetail);
</script>
</body>
</html>
